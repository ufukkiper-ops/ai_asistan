{% extends "base.html" %}

{% block content %}

<div class="layout">

    <div class="sidebar">

        <h2>AI Asistan</h2>

        <div class="user-box">
            <b>Kullanıcı:</b> {{ username }}
        </div>

        <a class="new-chat" href="/new_chat">
            + Yeni Sohbet
        </a>

        <div class="chat-list">
            {{ chat_list_html|safe }}
        </div>

    </div>

    <div class="main">

        <div class="topbar">

            <div>
                <b>Aktif Sohbet:</b> {{ active_chat }}
            </div>

            <div class="right-buttons">

                <a href="/mail">
                    <button class="btn btn-green">📧 Mailler</button>
                </a>

                <form method="post" action="/clear_chat" style="margin:0;">
                    <button class="btn btn-red" type="submit">
                        Temizle
                    </button>
                </form>

                <a href="/logout">
                    <button class="btn btn-blue">
                        Çıkış
                    </button>
                </a>

            </div>

        </div>

        <div id="messages" class="messages">
            {{ messages_html|safe }}
        </div>

        <div class="bottom">

            <form id="chat-form"
                  class="input-container"
                  method="post"
                  action="/"
                  onsubmit="sendTextMessage(event)"
                  enctype="multipart/form-data">

                <label for="file-input"
                       style="cursor:pointer;font-size:28px;color:#3b82f6;font-weight:bold;padding:0 5px;">
                    +
                </label>

                <input id="file-input"
                       type="file"
                       name="image"
                       accept="image/*,application/pdf"
                       style="display:none;">

                <input type="hidden"
                       name="action"
                       value="text">

                <input id="chat-input"
                       type="text"
                       name="soru"
                       placeholder="Mesajınızı yazın..."
                       autocomplete="off"
                       autofocus>

                <button class="btn btn-blue" type="submit">
                    Gönder
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
