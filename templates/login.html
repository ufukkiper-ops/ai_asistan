{% extends "base.html" %}

{% block body_class %}auth-page{% endblock %}

{% block content %}

<div class="auth-shell">
<div class="card">

<div class="auth-brand">
    <img class="auth-brand-logo" src="{{ url_for('static', filename='img/kipgpt-logo.png') }}" width="280" height="280" alt="KipGPT — Akıllı • Güvenilir • Yanında">
</div>

<h2>Giriş Yap</h2>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

{% if google_enabled %}
<label class="auth-option">
    <input type="checkbox" id="google-login-gmail">
    <span>Girişte Gmail’i de bağla / yenile</span>
</label>
<a id="google-login-btn"
   href="{{ url_for('auth.google_auth_start', action='login') }}"
   class="btn-google btn-google-primary"
   data-url-plain="{{ url_for('auth.google_auth_start', action='login') }}"
   data-url-mail="{{ url_for('auth.google_auth_start', action='login', with_mail='1') }}">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="" width="20" height="20">
    <span id="google-login-label">Google ile Giriş Yap</span>
</a>
<div class="auth-divider"><span>veya</span></div>
<script>
(function () {
    var box = document.getElementById("google-login-gmail");
    var btn = document.getElementById("google-login-btn");
    var label = document.getElementById("google-login-label");
    if (!box || !btn) return;
    function sync() {
        var on = box.checked;
        btn.href = on ? btn.getAttribute("data-url-mail") : btn.getAttribute("data-url-plain");
        if (label) label.textContent = on ? "Google ile giriş + Gmail" : "Google ile Giriş Yap";
    }
    box.addEventListener("change", sync);
    sync();
})();
</script>
{% endif %}

<form method="post" class="auth-form">

<input type="text" name="email" placeholder="E-posta veya kullanıcı adı" required autocomplete="username">
<input type="password" name="password" placeholder="Şifre" required autocomplete="current-password">

<button class="btn btn-blue btn-block" type="submit">Giriş Yap</button>

</form>

<p class="auth-footer-link">
<a href="{{ url_for('auth.register') }}">Hesabın yok mu? Kayıt Ol</a>
</p>

</div>
</div>

{% endblock %}
