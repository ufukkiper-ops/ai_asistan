{% extends "base.html" %}

{% block content %}

<div class="layout" style="justify-content:center;overflow-y:auto;padding:20px;">

    <div class="card" style="max-width:900px;width:100%;">

        <h2>E-Posta Asistanı</h2>

        <a href="/">
            <button class="btn btn-blue">
                Sohbete Dön
            </button>
        </a>

        {% if error %}
        <div class="error">
            {{ error }}
        </div>
        {% endif %}

        {{ folder_menu|safe }}

        <form method="get" action="/mail" style="margin-bottom:20px;">

            <input
                type="hidden"
                name="folder"
                value="{{ folder }}">

            <input
                type="text"
                name="search"
                value="{{ search }}"
                placeholder="🔍 Mail ara..."
                style="
                    width:100%;
                    padding:10px;
                    border-radius:8px;
                    border:1px solid #cbd5e1;
                    box-sizing:border-box;
                ">

        </form>

        {{ ai_preview_html|safe }}

        {{ mail_items_html|safe }}

    </div>

</div>

{% endblock %}
